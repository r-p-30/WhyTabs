<!DOCTYPE html>
<html lang="en">

<head>
  <title>WhyTabs</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <h3 style="display: flex; justify-content: space-between; align-items: center;">
    Save Current Tab
    <label id="readSwitchWrapper" class="switch" style="display: none;" title="Mark as Read">
      <input type="checkbox" id="readSwitch">
      <span class="slider"></span>
    </label>
  </h3>  
  <hr/>
  <textarea id="intent" placeholder="Add notes." rows="3" cols="29"></textarea>

  <button id="saveBtn">Save</button>

  <p id="status" style="margin-top:5px; font-size: 10px;"></p>
  <script src="popup.js"></script>
</body>

</html>
